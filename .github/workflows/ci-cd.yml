name: CI/CD Pipeline - Build and Deploy to EC2

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  EC2_HOST: ec2-13-222-56-46.compute-1.amazonaws.com
  APP_NAME: kafkaproducer
  DEPLOY_PATH: /opt/kafkaproducer

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Run tests
        run: ./gradlew test
        continue-on-error: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: build/libs/*.jar
          retention-days: 5

      - name: Upload deployment scripts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: |
            deploy-to-ec2.sh
            application-ec2.yml
          retention-days: 5

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest
    environment: prod
    # Run deploy on:
    #  - push to master (production) or develop (staging)
    #  - manual workflow_dispatch on master or develop
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: ./build/libs

      - name: Download deployment files
        uses: actions/download-artifact@v4
        with:
          name: deployment-files
          path: ./

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/milkeyED.pem
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/milkeyED.pem
          ssh-keyscan -H ${{ env.EC2_HOST }} >> ~/.ssh/known_hosts
      - name: Debug key format (safe)
        run: |
          set -e
          ls -l ~/.ssh/milkeyED.pem
          head -n 2 ~/.ssh/milkeyED.pem
          tail -n 2 ~/.ssh/milkeyED.pem
          ssh-keygen -lf ~/.ssh/milkeyED.pem

      - name: Copy files to EC2
        run: |
          scp -i ~/.ssh/milkeyED.pem build/libs/*.jar ubuntu@${{ env.EC2_HOST }}:/tmp/app.jar
          scp -i ~/.ssh/milkeyED.pem application-ec2.yml ubuntu@${{ env.EC2_HOST }}:/tmp/application.yml
          scp -i ~/.ssh/milkeyED.pem deploy-to-ec2.sh ubuntu@${{ env.EC2_HOST }}:/tmp/deploy.sh

      - name: Deploy on EC2
        env:
          RABBITMQ_HOST: ${{ secrets.RABBITMQ_HOST }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        run: |
          ssh -i ~/.ssh/milkeyED.pem ubuntu@${{ env.EC2_HOST }} << 'ENDSSH'
            # Stop existing application
            sudo systemctl stop rabbitmqproducer || true

            # Ensure application directories exist before any file operations
            sudo mkdir -p ${{ env.DEPLOY_PATH }}/config

            # Remove app.jar if it is accidentally a directory (prevents mv failure)
            if [ -d "${{ env.DEPLOY_PATH }}/app.jar" ]; then
              sudo rm -rf "${{ env.DEPLOY_PATH }}/app.jar"
            fi

            # Backup current version
            sudo cp ${{ env.DEPLOY_PATH }}/app.jar ${{ env.DEPLOY_PATH }}/app.jar.backup || true

            # Deploy new version
            sudo mv /tmp/app.jar ${{ env.DEPLOY_PATH }}/app.jar
            sudo mv /tmp/application.yml ${{ env.DEPLOY_PATH }}/config/application.yml
            sudo chmod +x /tmp/deploy.sh

            # Set environment variables
            export RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}
            export RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}
            export RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}

            # Run deployment script if first time
            if [ ! -f /etc/systemd/system/rabbitmqproducer.service ]; then
              sudo bash /tmp/deploy.sh
            fi

            # Set permissions
            sudo chown -R rabbitmqapp:rabbitmqapp ${{ env.DEPLOY_PATH }}

            # Start application
            sudo systemctl daemon-reload
            sudo systemctl start rabbitmqproducer
            sudo systemctl enable rabbitmqproducer

            # Wait for application to start
            sleep 10

            # Check status
            sudo systemctl status rabbitmqproducer --no-pager
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          status_code=$(curl -s -o /dev/null -w "%{http_code}" http://${{ env.EC2_HOST }}:8080/actuator/health)
          if [ $status_code -eq 200 ]; then
            echo "✓ Deployment successful! Application is healthy."
          else
            echo "✗ Deployment failed! Health check returned status code: $status_code"
            exit 1
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment successful!"
          echo "Application URL: http://${{ env.EC2_HOST }}:8080"
          echo "Swagger UI: http://${{ env.EC2_HOST }}:8080/swagger-ui.html"
          echo "Health: http://${{ env.EC2_HOST }}:8080/actuator/health

      - name: Rollback on failure
        if: failure()
        run: |
          ssh -i ~/.ssh/milkeyED.pem ubuntu@${{ env.EC2_HOST }} << 'ENDSSH'
            echo "Rolling back to previous version..."
            sudo systemctl stop rabbitmqproducer
            sudo cp ${{ env.DEPLOY_PATH }}/app.jar.backup ${{ env.DEPLOY_PATH }}/app.jar || true
            sudo systemctl start rabbitmqproducer
          ENDSSH
          echo "Deployment failed - rolled back to previous version"
          exit 1