spring:
  application:
    name: rabbitmqproducer
  
  # RabbitMQ Configuration
  rabbitmq:
    host: 13.222.56.46
    port: 5672
    username: admin
    password: admin123
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3
        multiplier: 2.0

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:rabbitmqdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console Configuration
  h2:
    console:
      enabled: true
      path: /h2-console

# RabbitMQ Queue/Exchange Configuration
rabbitmq:
  exchange:
    name: orders.exchange
    type: topic
  queue:
    name: orders.queue
  routing-key: orders.routing.key

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

