spring:
  application:
    name: kafkaproducer
  kafka:
    # Update this with your EC2 Kafka broker address
    # If Kafka is on the same EC2: localhost:9092
    # If Kafka is on another EC2: <private-ip>:9092
    # If using MSK: <msk-bootstrap-servers>
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Production settings
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 10
      buffer-memory: 33554432
      compression-type: snappy
    properties:
      acks: all
      retries: 3
      batch-size: 16384

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:/opt/kafkaproducer/data/kafkadb
    driver-class-name: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:}

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # H2 Console Configuration - DISABLE in production for security
  h2:
    console:
      enabled: false
      path: /h2-console

# Kafka Topic Configuration
kafka:
  topic:
    name: ${KAFKA_TOPIC_NAME:ordersTopic}
    partitions: 3
    replication-factor: ${KAFKA_REPLICATION_FACTOR:1}

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  tomcat:
    max-threads: 200
    min-spare-threads: 10

# Logging Configuration
logging:
  level:
    root: INFO
    com.kafka.demo.kafkaproducer: INFO
    org.springframework.kafka: WARN
    org.hibernate: WARN
  file:
    name: /opt/kafkaproducer/logs/application.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management Endpoints (for health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    kafka:
      enabled: true

