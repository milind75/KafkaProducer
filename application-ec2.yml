spring:
  application:
    name: rabbitmqproducer
  
  # RabbitMQ Configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3
        multiplier: 2.0
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:file:/opt/rabbitmqproducer/data/rabbitmqdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ${DB_PASSWORD:}

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # H2 Console Configuration - DISABLE in production for security
  h2:
    console:
      enabled: false
      path: /h2-console

# RabbitMQ Queue/Exchange Configuration
rabbitmq:
  exchange:
    name: ${RABBITMQ_EXCHANGE_NAME:orders.exchange}
    type: topic
  queue:
    name: ${RABBITMQ_QUEUE_NAME:orders.queue}
  routing-key: ${RABBITMQ_ROUTING_KEY:orders.routing.key}

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  tomcat:
    max-threads: 200
    min-spare-threads: 10

# Logging Configuration
logging:
  level:
    root: INFO
    com.kafka.demo.kafkaproducer: INFO
    org.springframework.amqp: WARN
    org.hibernate: WARN
  file:
    name: /opt/rabbitmqproducer/logs/application.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management Endpoints (for health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    rabbit:
      enabled: true

